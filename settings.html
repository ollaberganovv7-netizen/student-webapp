<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taqdimot Sozlamalari</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #1e293b;
            --input-bg: #0f172a;
            --accent: #3b82f6;
            --accent-pro: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            text-align: center;
            font-size: 20px;
            margin: 0;
        }

        /* Quality Badge */
        .quality-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
        }

        .quality-badge.standard {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }

        .quality-badge.premium {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #a78bfa;
        }

        .quality-badge .icon {
            font-size: 22px;
        }

        .quality-badge .sub {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .input-group {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            padding: 0;
            box-sizing: border-box;
        }

        .slider-container {}

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }

        .info-box {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-item span:first-child {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
        }

        .info-item span:last-child {
            font-weight: 700;
            font-size: 16px;
        }

        .price-status {
            font-size: 12px;
            margin-top: 4px;
            grid-column: 1 / -1;
        }

        .price-status.ok {
            color: #10b981;
        }

        .price-status.warn {
            color: #f59e0b;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-row .label-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .toggle-row .label-group .title {
            font-size: 15px;
            font-weight: 600;
        }

        .toggle-row .label-group .sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* iOS-style toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 28px;
        }

        .switch input {
            display: none;
        }

        .slider-sw {
            position: absolute;
            inset: 0;
            background: #334155;
            border-radius: 28px;
            cursor: pointer;
            transition: .3s;
        }

        .slider-sw:before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        .switch input:checked+.slider-sw {
            background: #10b981;
        }

        .switch input:checked+.slider-sw:before {
            transform: translateX(20px);
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:active {
            opacity: 0.8;
        }

        .btn-save.pro {
            background: var(--accent-pro);
        }

        .topic-card {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .topic-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .topic-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #93c5fd;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            padding: 0;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            line-height: 1.4;
        }

        .topic-input::placeholder {
            color: #475569;
            font-weight: 400;
        }
    </style>
</head>

<body>

    <h2>Taqdimot Sozlamalari</h2>

    <!-- Topic editable input -->
    <div class="topic-card" id="topicCard">
        <span class="topic-label">✏️ Mavzu (tahrirlash mumkin)</span>
        <textarea class="topic-input" id="topicInput" rows="2" placeholder="Mavzuni kiriting..."></textarea>
    </div>

    <!-- Quality Badge (replaces the toggle) -->
    <div class="quality-badge" id="qualityBadge">
        <span class="icon" id="qualityIcon">✨</span>
        <div>
            <div id="qualityLabel">Standart</div>
            <div class="sub" id="qualitySub">Sifatli akademik taqdimot</div>
        </div>
    </div>

    <div class="input-group">
        <label>Muallif</label>
        <input type="text" id="author" placeholder="Ism Familiya">
    </div>

    <div class="input-group">
        <label>Til</label>
        <select id="language">
            <option value="uz">O'zbekcha 🇺🇿</option>
            <option value="ru">Русский 🇷🇺</option>
            <option value="en">English 🇺🇸</option>
        </select>
    </div>

    <div class="slider-container">
        <div class="slider-header">
            <span>Sahifa miqdori</span>
            <span id="slide-count">10</span>
        </div>
        <input type="range" id="slides" min="6" max="30" value="10">
    </div>


    <div class="info-box">
        <div class="info-item">
            <span>Balans:</span>
            <span id="balance">0</span>
        </div>
        <div class="info-item">
            <span>Joriy narx:</span>
            <span id="price">3000</span>
        </div>
        <div class="price-status ok" id="status">Balans yetarli</div>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveSettings()">Saqlash</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const isPremium = urlParams.get('quality') === 'premium';
        const balance = parseInt(urlParams.get('balance') || '0');
        const topic = urlParams.get('topic') || '';

        // Populate topic field
        document.getElementById('topicInput').value = topic;

        // Set author and language
        document.getElementById('author').value = urlParams.get('name') || '';
        document.getElementById('balance').innerText = balance.toLocaleString();

        // Show quality badge
        const badge = document.getElementById('qualityBadge');
        const icon = document.getElementById('qualityIcon');
        const label = document.getElementById('qualityLabel');
        const sub = document.getElementById('qualitySub');
        const saveBtn = document.getElementById('saveBtn');

        if (isPremium) {
            badge.classList.add('premium');
            icon.innerText = '💎';
            label.innerText = 'Premium (Pro)';
            sub.innerText = 'Chuqur ilmiy tahlil + manbalar [1][2]';
            saveBtn.classList.add('pro');
        } else {
            badge.classList.add('standard');
            icon.innerText = '✨';
            label.innerText = 'Standart';
            sub.innerText = 'Sifatli akademik taqdimot';
        }

        // Pricing
        const PRICES = {
            standard_low: 3000,
            standard_mid: 5000,
            standard_high: 7000,
            premium_low: 6000,
            premium_mid: 10000,
            premium_high: 14000,
        };

        const slidesInput = document.getElementById('slides');
        const slideCountDisp = document.getElementById('slide-count');

        function calcPrice(count) {
            let base;
            if (isPremium) {
                if (count <= 12) base = PRICES.premium_low;
                else if (count <= 20) base = PRICES.premium_mid;
                else base = PRICES.premium_high;
            } else {
                if (count <= 12) base = PRICES.standard_low;
                else if (count <= 20) base = PRICES.standard_mid;
                else base = PRICES.standard_high;
            }
            return base;
        }

        function updateUI() {
            const count = parseInt(slidesInput.value);
            slideCountDisp.innerText = count;

            const price = calcPrice(count);
            document.getElementById('price').innerText = price.toLocaleString();

            const statusEl = document.getElementById('status');
            if (balance >= price) {
                statusEl.innerText = '✅ Balans yetarli';
                statusEl.className = 'price-status ok';
            } else {
                statusEl.innerText = `⚠️ Yetishmaydi: ${(price - balance).toLocaleString()} so'm`;
                statusEl.className = 'price-status warn';
            }
        }

        slidesInput.oninput = updateUI;
        updateUI();

        function saveSettings() {
            tg.HapticFeedback.impactOccurred("medium");
            const topicVal = document.getElementById('topicInput').value.trim();
            if (!topicVal) {
                tg.showAlert('❗ Mavzu bo\'sh bo\'lishi mumkin emas!');
                return;
            }
            const data = {
                author: document.getElementById('author').value,
                language: document.getElementById('language').value,
                slides: slidesInput.value,
                premium: isPremium,
                ai_images: false,
                topic: topicVal
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>

</html>
